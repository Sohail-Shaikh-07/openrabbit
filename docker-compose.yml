name: openrabbit

services:
  openrabbit:
    build:
      context: .
      dockerfile: Dockerfile
    image: openrabbit:latest
    container_name: openrabbit
    env_file:
      - .env
    environment:
      OPENRABBIT_QDRANT__URL: http://qdrant:6333
    volumes:
      # Mount the repository OpenRabbit should review at /workspace.
      # Override with OPENRABBIT_WORKSPACE=/path/to/repo in your .env.
      - ${OPENRABBIT_WORKSPACE:-./}:/workspace:ro
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openrabbit", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: openrabbit-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
    name: openrabbit_qdrant_data
